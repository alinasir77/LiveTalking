<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Avatar - POC Developement</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/tt-norms-pro" rel="stylesheet">
    <style>
        :root {
            --primary-color: #193CB8;
            --primary-hover: #122c8c;
            --primary-light: rgba(25, 60, 184, 0.08);
            --primary-light-hover: rgba(25, 60, 184, 0.15);
            --bg-color: #f4f5fa;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --font-family: 'TT Norms Pro', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1700px;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0 20px;
            width: 100%;
            text-align: center;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .title-badge {
            background: rgba(25, 60, 184, 0.08);
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid rgba(25, 60, 184, 0.2);
        }

        .header-bar h1 {
            font-size: 56px;
            font-weight: 800;
            margin: 0;
            color: black;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        .header-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: -5px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo i {
            font-size: 26px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.connected {
            background-color: #10B981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
        }

        .status-dot.disconnected {
            background-color: #EF4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }

        .status-dot.connecting {
            background-color: #F59E0B;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
            animation: pulse-status 1.5s infinite;
        }

        @keyframes pulse-status {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .main-layout {
            display: flex;
            gap: 24px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }

        /* Avatar Container */
        .avatar-section {
            flex: 1 1 600px;
            width: 100%;
            max-width: 1152px;
            aspect-ratio: 16 / 9;
            height: auto;
            position: relative;
            background-color: #0d0e12;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            transition: opacity 0.5s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: #000;
        }

        .try-out-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 10px 96px;
            background-color: var(--primary-color);
            color: #ffffff !important;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 6px 10px rgba(25, 60, 184, 0.157);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .try-out-btn:hover {
            background-color: var(--primary-hover);
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 24px rgba(25, 60, 184, 0.5);
        }

        .try-out-btn:active {
            transform: translateX(-50%) translateY(0);
        }

        /* Chat Panel */
        .chat-section {
            flex: 1 1 350px;
            width: 100%;
            max-width: 440px;
            height: auto;
            min-height: 500px;
            max-height: 70vh;
            background-color: var(--card-bg);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px 24px 16px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:hover {
            background-color: #f1f5f9;
            color: var(--primary-color);
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            position: relative;
            background-color: #ffffff;
        }

        /* Welcome Screen inside Chat */
        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 16px;
            animation: fadeIn 0.4s ease-out;
        }

        .chat-welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 6px 16px rgba(25, 60, 184, 0.25);
        }

        .chat-welcome-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .chat-welcome-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
            max-width: 280px;
            line-height: 1.5;
        }

        /* Message feed list */
        .chat-messages {
            display: none;
            flex-direction: column;
            gap: 16px;
            height: 100%;
            overflow-y: auto;
        }

        .chat-message-item {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chat-message-item.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .chat-message-item.avatar {
            align-self: flex-start;
            align-items: flex-start;
        }

        .chat-message-bubble {
            padding: 12px 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-message-item.user .chat-message-bubble {
            background-color: var(--primary-color);
            color: #ffffff;
            border-radius: 16px 16px 4px 16px;
            box-shadow: 0 4px 12px rgba(25, 60, 184, 0.15);
        }

        .chat-message-item.avatar .chat-message-bubble {
            background-color: #f1f5f9;
            color: var(--text-main);
            border-radius: 16px 16px 16px 4px;
            border: 1px solid var(--border-color);
        }

        .chat-message-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Chat Footer */
        .chat-footer {
            padding: 16px 24px 20px 24px;
            border-top: 1px solid #f1f5f9;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 6px 6px 6px 18px;
            transition: all 0.2s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(25, 60, 184, 0.1);
        }

        .chat-input-wrapper.disabled {
            background-color: #f1f5f9;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
            resize: none;
            height: 24px;
            line-height: 24px;
            padding: 0;
            font-family: inherit;
        }

        .chat-input:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .chat-send-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--border-radius-md);
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .chat-send-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .chat-send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .chat-send-btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Stop Avatar Button */
        .stop-avatar-btn {
            background-color: #ef4444 !important;
            box-shadow: 0 6px 10px rgba(239, 68, 68, 0.2) !important;
        }

        .stop-avatar-btn:hover {
            background-color: #dc2626 !important;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4) !important;
        }

        /* Settings popover details */
        .settings-popover {
            position: absolute;
            top: 65px;
            right: 24px;
            width: 220px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 16px;
            z-index: 100;
            display: none;
            animation: fadeIn 0.2s ease-out;
        }

        .settings-popover-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header-bar">
            <div class="header-content">
                <div class="title-badge">Live Demo</div>
                <h1>Interactive Avatar</h1>
                <p class="header-subtitle">Real-Time Interactive Digital Human</p>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="main-layout">
            <!-- Left Side: Fixed Size Avatar Section -->
            <div class="avatar-section">
                <!-- Placeholder Image -->
                <img id="placeholder-img" class="avatar-placeholder" src="avatar-placeholder.webp" alt="Avatar Placeholder">
                
                <!-- Video stream -->
                <video id="video" autoplay playsinline style="display: none;"></video>
                <!-- Audio stream (hidden but required) -->
                <audio id="audio" autoplay style="display: none;"></audio>

                <!-- Status Overlay -->
                <div class="status-badge" style="position: absolute; top: 16px; right: 16px; z-index: 10; background: rgba(13, 14, 18, 0.6); color: white; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);">
                    <span class="status-dot disconnected" id="status-dot"></span>
                    <span id="status-text">Disconnected</span>
                </div>

                <!-- Try It Out (Start connection) overlay button -->
                <button class="try-out-btn" id="start">
                    <span>Try It Out</span>
                </button>
                
                <!-- Stop Avatar overlay button -->
                <button class="try-out-btn stop-avatar-btn" id="stop" style="display: none;">
                    <span>Stop Avatar</span>
                </button>
            </div>

            <!-- Right Side: Chat Section -->
            <div class="chat-section">
                <!-- Chat Header -->
                <div class="chat-header">
                    <h3 class="chat-title">Live Chat</h3>
                    <button class="settings-btn" id="settings-toggle" title="Settings">
                        <i class="bi bi-gear-fill"></i>
                    </button>
                    <!-- Small clean settings popover for STUN option -->
                    <div class="settings-popover" id="settings-popover">
                        <div class="settings-popover-title">Connection Settings</div>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input" type="checkbox" id="use-stun">
                            <label class="form-check-label" for="use-stun" style="font-size: 13px; font-weight: 500; cursor: pointer;">Use STUN Server</label>
                        </div>
                    </div>
                </div>

                <!-- Chat Body -->
                <div class="chat-body">
                    <!-- Welcoming helper when session has not started -->
                    <div class="chat-welcome" id="chat-welcome">
                        <div class="chat-welcome-icon">
                            <i class="bi bi-chat-fill"></i>
                        </div>
                        <h4 class="chat-welcome-title">Start Your Conversation</h4>
                        <p class="chat-welcome-desc">Begin chatting with the AI avatar. Type your message below to get started.</p>
                    </div>

                    <!-- Chat Messages feed (active during session) -->
                    <div class="chat-messages" id="chat-messages"></div>
                </div>

                <!-- Chat Footer -->
                <div class="chat-footer">
                    <!-- Chat Input Form -->
                    <form id="chat-form" style="width: 100%; margin: 0;">
                        <div class="chat-input-wrapper disabled" id="chat-input-wrapper">
                            <textarea class="chat-input" id="chat-message" placeholder="Start avatar session first..." disabled rows="1"></textarea>
                            <button class="chat-send-btn" type="submit" id="send-msg-btn" disabled>
                                <i class="bi bi-send-fill"></i>
                            </button>
                        </div>
                    </form>

                    <!-- (Stop button moved to avatar section) -->
                </div>
            </div>
        </div>

        <!-- Hidden session ID -->
        <input type="hidden" id="sessionid" value="0">

     
    </div>

    <!-- Script imports -->
    <script src="client.js"></script>
    <script src="srs.sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Settings Popover Toggle
            $('#settings-toggle').click(function(e) {
                e.stopPropagation();
                $('#settings-popover').toggle();
            });
            $(document).click(function(e) {
                if (!$(e.target).closest('.chat-header').length) {
                    $('#settings-popover').hide();
                }
            });

            // Adjust text area size or layout on message keypress
            $('#chat-message').on('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    $('#chat-form').submit();
                }
            });

            // Toggle active visual states of Chat Section
            function setChatActiveState(active) {
                const wrapper = $('#chat-input-wrapper');
                const textarea = $('#chat-message');
                const sendBtn = $('#send-msg-btn');
                const welcome = $('#chat-welcome');
                const messages = $('#chat-messages');

                if (active) {
                    welcome.hide();
                    messages.show().css('display', 'flex');
                    wrapper.removeClass('disabled');
                    textarea.prop('disabled', false).attr('placeholder', 'Type a message...');
                    sendBtn.prop('disabled', false);
                    messages.scrollTop(messages[0].scrollHeight);
                } else {
                    welcome.show();
                    messages.hide().empty();
                    wrapper.addClass('disabled');
                    textarea.prop('disabled', true).attr('placeholder', 'Start avatar session first...').val('');
                    sendBtn.prop('disabled', true);
                }
            }

            // Connection Status Updates
            function updateConnectionStatus(status) {
                const statusDot = $('#status-dot');
                const statusText = $('#status-text');
                const placeholder = $('#placeholder-img');
                const video = $('#video');

                statusDot.removeClass('connected disconnected connecting');
                
                switch(status) {
                    case 'connected':
                        statusDot.addClass('connected');
                        statusText.text('Connected');
                        placeholder.fadeOut(300);
                        video.fadeIn(300);
                        setChatActiveState(true);
                        break;
                    case 'connecting':
                        statusDot.addClass('connecting');
                        statusText.text('Connecting...');
                        placeholder.fadeIn(300);
                        video.fadeOut(300);
                        setChatActiveState(false);
                        break;
                    case 'disconnected':
                    default:
                        statusDot.addClass('disconnected');
                        statusText.text('Disconnected');
                        placeholder.fadeIn(300);
                        video.fadeOut(300);
                        setChatActiveState(false);
                        break;
                }
            }

            // Chat Message Insertion
            function addChatMessage(message, type = 'user') {
                const messagesContainer = $('#chat-messages');
                const messageClass = type === 'user' ? 'user' : 'avatar';
                const senderName = type === 'user' ? 'You' : 'Avatar';

                const messageElement = $(`
                    <div class="chat-message-item ${messageClass}">
                        <span class="chat-message-sender">${senderName}</span>
                        <div class="chat-message-bubble">
                            ${message}
                        </div>
                    </div>
                `);

                messagesContainer.append(messageElement);
                messagesContainer.scrollTop(messagesContainer[0].scrollHeight);
            }

            // Connection actions
            let connectionCheckTimer = null;

            $('#start').click(function() {
                updateConnectionStatus('connecting');
                
                // Call starting connection handler in client.js
                start();
                
                // Polling check to confirm actual video transmission
                connectionCheckTimer = setInterval(function() {
                    const videoEl = document.getElementById('video');
                    if (videoEl.readyState >= 3 && videoEl.videoWidth > 0) {
                        updateConnectionStatus('connected');
                        clearInterval(connectionCheckTimer);
                    }
                }, 1000);

                // Timeout checking after 30s
                setTimeout(function() {
                    if (connectionCheckTimer) {
                        clearInterval(connectionCheckTimer);
                    }
                }, 30000);
            });

            $('#stop').click(function() {
                if (connectionCheckTimer) {
                    clearInterval(connectionCheckTimer);
                }
                stop();
                $(this).hide();
                $('#start').show();
                updateConnectionStatus('disconnected');
            });

            // Chat form submission logic
            $('#chat-form').on('submit', function(e) {
                e.preventDefault();
                const textInput = $('#chat-message');
                const messageVal = textInput.val().trim();
                
                if (!messageVal) return;

                console.log('Sending message to avatar:', messageVal);

                fetch('/human', {
                    body: JSON.stringify({
                        text: messageVal,
                        type: 'chat',
                        interrupt: true,
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                }).catch(function(error) {
                    console.error('Error posting chat message:', error);
                });

                // Instantly append user message to feed
                addChatMessage(messageVal, 'user');
                textInput.val('');
            });

            // Bind to global WebRTC state callbacks to trigger correct UI responses
            if (typeof window.onWebRTCConnected === 'function') {
                const prevOnWebRTCConnected = window.onWebRTCConnected;
                window.onWebRTCConnected = function() {
                    updateConnectionStatus('connected');
                    if (prevOnWebRTCConnected) prevOnWebRTCConnected();
                };
            } else {
                window.onWebRTCConnected = function() {
                    updateConnectionStatus('connected');
                };
            }

            if (typeof window.onWebRTCDisconnected === 'function') {
                const prevOnWebRTCDisconnected = window.onWebRTCDisconnected;
                window.onWebRTCDisconnected = function() {
                    updateConnectionStatus('disconnected');
                    if (prevOnWebRTCDisconnected) prevOnWebRTCDisconnected();
                };
            } else {
                window.onWebRTCDisconnected = function() {
                    updateConnectionStatus('disconnected');
                };
            }
        });
    </script>
</body>
</html>
